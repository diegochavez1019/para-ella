<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta del Día</title>

<style>

/* ---------- FONDO ---------- */

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* DESTELLOS */

.sparkle{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* ---------- CONTENIDO ---------- */

header{
padding:40px;
font-size:40px;
font-weight:bold;
}

main{
padding:20px;
max-width:800px;
margin:auto;
}

.description{
font-size:18px;
margin-bottom:30px;
}

img{
max-width:100%;
border-radius:10px;
}

/* ---------- BOTÓN DINÁMICO ---------- */

footer{
margin-top:50px;
padding-bottom:40px;
}

button{
width:10cm;
height:2cm;
font-size:20px;
font-weight:bold;
background:linear-gradient(45deg,#ff4da6,#ff66cc,#ff99dd);
border:3px solid white;
border-radius:15px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,105,180,0.7);
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,105,180,1);
background:linear-gradient(45deg,#ff66cc,#ff4da6,#ff99dd);
}

/* ---------- SOBRE ---------- */

#envelopeContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
}

/* SOBRE GRANDE */

.envelope{
width:420px;
height:260px;
background:#e0e0e0;
position:relative;
cursor:pointer;
border-radius:6px;
}

/* TAPA */

.flap{
position:absolute;
width:0;
height:0;
border-left:210px solid transparent;
border-right:210px solid transparent;
border-bottom:130px solid #d5d5d5;
top:-130px;
transform-origin:bottom;
transition:1s;
}

/* CARTA GRANDE */

.letter{
position:absolute;
width:380px;
height:220px;
background:white;
top:20px;
left:20px;
padding:20px;
box-sizing:border-box;
opacity:0;
transition:1s;
color:black;
font-size:18px;
overflow:auto;
border-radius:6px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* ESTADO ABIERTO */

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
opacity:1;
transform:translateY(-140px);
}

</style>
</head>

<body>

<header>
ℱ𝒪ℛ ℳ𝒴 ℒ𝒪𝒱ℰ 🌷
</header>

<main>

<div class="description">
Ahora si mucha suere el dia de hoy en tu entrevista vaquerita
  Puedes conquistar el lejano oeste si te lo propones ❤️
</div>

<img src="she.jpg" style="max-width:400px;border-radius:10px;">

</main>

<footer>
<button onclick="openEnvelope()">
Abrir Carta 💌
</button>
</footer>

<!-- SOBRE -->

<div id="envelopeContainer" onclick="closeEnvelope(event)">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="letter">
Si te pones nerviosa no lo olvides, eres alguien capaz, con energia, experiencia, chula y tienes todo lo necesario asi que solo se
  tu y todo saldra bien. Te amo. ❤️
</div>

</div>

</div>

<script>

/* DESTELLOS */

function createSparkle(){

const s=document.createElement("div");
s.classList.add("sparkle");

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>{s.remove()},2000);

}

setInterval(createSparkle,150);


/* ABRIR SOBRE */

function openEnvelope(){

const container=document.getElementById("envelopeContainer");
container.style.visibility="visible";

setTimeout(()=>{
document.getElementById("envelope").classList.add("open");
},300);

}


/* CERRAR SOBRE AL HACER CLIC FUERA */

function closeEnvelope(event){

const envelope=document.getElementById("envelope");

if(!envelope.contains(event.target)){

document.getElementById("envelopeContainer").style.visibility="hidden";
envelope.classList.remove("open");

}

}

</script>

</body>

</html>
