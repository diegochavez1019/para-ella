<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta del Día</title>

<style>

/* ---------- FONDO ---------- */

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* GALAXIA */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.15),transparent 40%),
radial-gradient(circle at 80% 60%,rgba(255,255,255,0.12),transparent 40%),
radial-gradient(circle at 50% 80%,rgba(255,255,255,0.08),transparent 40%);
animation:galaxy 60s linear infinite;
z-index:-2;
}

@keyframes galaxy{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

/* ---------- LUNA ---------- */

.moon{
position:fixed;
top:60px;
right:80px;
width:120px;
height:120px;
background:radial-gradient(circle,#fff,#ddd);
border-radius:50%;
box-shadow:0 0 40px rgba(255,255,255,0.8);
z-index:-1;
}

/* ---------- ESTRELLAS ---------- */

.sparkle{
position:fixed;
background:white;
border-radius:50%;
opacity:0.9;
animation:twinkle infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* ---------- ESTRELLAS FUGACES ---------- */

.shootingStar{
position:fixed;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
opacity:0.8;
transform:rotate(45deg);
animation:shoot 1.2s linear forwards;
}

@keyframes shoot{

0%{
transform:translate(0,0) rotate(45deg);
opacity:1;
}

100%{
transform:translate(-600px,600px) rotate(45deg);
opacity:0;
}

}

/* ---------- TITULO ---------- */

header{

padding:25px 40px;
font-size:40px;
font-weight:bold;
display:inline-block;
margin-top:30px;

background:rgba(255,255,255,0.9);
color:black;

border-radius:25px;
border:3px solid white;

box-shadow:
0 0 20px rgba(255,255,255,0.8),
0 0 40px rgba(255,255,255,0.4);

}

/* ---------- CONTENIDO ---------- */

main{
padding:20px;
max-width:800px;
margin:auto;
}

.description{
font-size:18px;
margin-bottom:30px;
}

/* IMAGEN FLOTANTE */

img{
max-width:100%;
border-radius:12px;
animation:float 4s ease-in-out infinite;
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* ---------- BOTÓN ---------- */

footer{
margin-top:50px;
padding-bottom:40px;
}

button{

width:10cm;
height:2cm;

font-size:20px;
font-weight:bold;

background:linear-gradient(45deg,#ff4da6,#ff66cc,#ff99dd);

border:3px solid white;
border-radius:15px;

color:white;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 15px rgba(255,105,180,0.7);

animation:buttonGlow 3s infinite;

}

@keyframes buttonGlow{
0%{box-shadow:0 0 15px rgba(255,105,180,0.7);}
50%{box-shadow:0 0 35px rgba(255,105,180,1);}
100%{box-shadow:0 0 15px rgba(255,105,180,0.7);}
}

button:hover{
transform:scale(1.08);
}

/* ---------- SOBRE ---------- */

#envelopeContainer{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:flex;
justify-content:center;
align-items:center;

visibility:hidden;

}

.envelope{

width:420px;
height:260px;

background:#e0e0e0;

position:relative;
cursor:pointer;

border-radius:6px;

}

/* TAPA */

.flap{

position:absolute;

width:0;
height:0;

border-left:210px solid transparent;
border-right:210px solid transparent;
border-bottom:130px solid #d5d5d5;

top:-130px;

transform-origin:bottom;

transition:1s;

}

/* CARTA */

.letter{

position:absolute;

width:380px;
height:220px;

background:white;

top:20px;
left:20px;

padding:20px;

box-sizing:border-box;

opacity:0;

transition:1s;

color:black;

font-size:18px;

overflow:auto;

border-radius:6px;

box-shadow:0 0 20px rgba(0,0,0,0.4);

}

/* ESTADO ABIERTO */

.open .flap{
transform:rotateX(180deg);
}

.open .letter{

opacity:1;
transform:translateY(-140px);

}

/* CORAZONES */

.heart{
position:fixed;
font-size:20px;
animation:heartFloat 4s linear forwards;
}

@keyframes heartFloat{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-200px);
opacity:0;
}

}

</style>
</head>

<body>

<div class="moon"></div>

<header>
ℱ𝒪ℛ ℳ𝒴 ℒ𝒪𝒱ℰ 🌷
</header>

<main>

<div class="description">
Ahora si mucha suerte el día de hoy en tu entrevista vaquerita.
Puedes conquistar el lejano oeste si te lo propones ❤️
</div>

<img src="she.jpg" style="max-width:400px;">

</main>

<footer>
<button onclick="openEnvelope()">
Abrir Carta 💌
</button>
</footer>

<div id="envelopeContainer" onclick="closeEnvelope(event)">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="letter">
Si te pones nerviosa no lo olvides, eres alguien capaz, con energia, experiencia, chula y tienes todo lo necesario asi que solo se tu y todo saldra bien. Te amo. ❤️
</div>

</div>

</div>

<script>

/* ESTRELLAS */

function createSparkle(){

const s=document.createElement("div");
s.classList.add("sparkle");

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

let size=Math.random()*4+1;

s.style.width=size+"px";
s.style.height=size+"px";

s.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(s);

setTimeout(()=>{s.remove()},6000);

}

setInterval(createSparkle,70);

/* ESTRELLAS FUGACES */

function shootingStar(){

const star=document.createElement("div");
star.classList.add("shootingStar");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*40+"vh";

document.body.appendChild(star);

setTimeout(()=>{star.remove()},1200);

}

setInterval(shootingStar,4000);

/* ABRIR SOBRE */

function openEnvelope(){

const container=document.getElementById("envelopeContainer");

container.style.visibility="visible";

setTimeout(()=>{
document.getElementById("envelope").classList.add("open");
},300);

/* CORAZONES */

for(let i=0;i<8;i++){

let heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=(45+Math.random()*10)+"vw";
heart.style.top="60vh";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},4000);

}

}

/* CERRAR SOBRE */

function closeEnvelope(event){

const envelope=document.getElementById("envelope");

if(!envelope.contains(event.target)){

document.getElementById("envelopeContainer").style.visibility="hidden";
envelope.classList.remove("open");

}

}

</script>

</body>
</html>
